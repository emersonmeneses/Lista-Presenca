<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body class="dashboard-body">

<div class="top-bar"></div>

<div class="menu-icon" onclick="toggleMenu()">☰</div>

<div class="sidebar" id="sidebar">
<a onclick="abrirModal()">Cadastrar Aluno</a>
<a href="relatorios.html">Relatórios</a>
<a href="index.html">Sair</a>
</div>

<div class="professor-section">
<img src="assets/professor.jpg" class="prof-avatar">
<h1>Prof. Emerson Meneses</h1>
<p>Turma 5º Ano B • Sala 102</p>
<p>Professor(a) de Matemática</p>
</div>

<div class="lista-container">

<div class="lista-header">
<h2>Lista de Alunos</h2>
<div class="contador">
<span class="badge-presenca">Presença: <span id="contadorPresenca">0</span></span>
<span class="badge-ausencia">Ausência: <span id="contadorAusencia">0</span></span>
</div>
</div>

<div id="listaAlunos"></div>

</div>

<!-- Modal -->
<div class="modal" id="modalAluno">
<div class="modal-content">
<h3 id="modalTitulo">Cadastrar Aluno</h3>
<input type="text" id="nomeAluno" placeholder="Nome do aluno">
<input type="file" id="fotoAluno">
<textarea id="comentarioAluno" placeholder="Comentário"></textarea>
<button onclick="salvarAluno()">Salvar</button>
<button onclick="fecharModal()">Cancelar</button>
</div>
</div>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script src="js/firebase-config.js"></script>
<script src="js/auth-check.js"></script>

<script type="module" src="js/script.js"></script>

</body>
</html>
